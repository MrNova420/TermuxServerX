<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TermuxServerX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 50px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .logo {
            text-align: center;
            margin-bottom: 40px;
        }
        .logo h1 {
            color: #00d9ff;
            font-size: 3rem;
            font-weight: 800;
            text-shadow: 0 0 40px rgba(0,217,255,0.5);
            letter-spacing: 4px;
        }
        .logo p {
            color: rgba(255,255,255,0.5);
            margin-top: 8px;
            font-size: 0.9rem;
            letter-spacing: 2px;
        }
        .form-group {
            margin-bottom: 24px;
        }
        label {
            display: block;
            color: rgba(255,255,255,0.7);
            margin-bottom: 10px;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 1px;
        }
        input {
            width: 100%;
            padding: 16px 20px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            background: rgba(255,255,255,0.03);
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #00d9ff;
            box-shadow: 0 0 20px rgba(0,217,255,0.2);
            background: rgba(255,255,255,0.05);
        }
        .btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 1px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #00d9ff 0%, #0099cc 100%);
            color: #000;
            margin-top: 10px;
        }
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0,217,255,0.4);
        }
        .error {
            background: rgba(255,71,87,0.15);
            border: 1px solid rgba(255,71,87,0.3);
            color: #ff6b7a;
            padding: 14px;
            border-radius: 10px;
            margin-bottom: 24px;
            text-align: center;
            font-size: 0.9rem;
        }
        .footer {
            text-align: center;
            margin-top: 30px;
            color: rgba(255,255,255,0.3);
            font-size: 0.8rem;
        }
        .footer span {
            color: #00d9ff;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .loading {
            animation: pulse 1.5s infinite;
            text-align: center;
            color: rgba(255,255,255,0.5);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>TSX</h1>
            <p>TERMINAL SERVER</p>
        </div>
        
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        
        <form method="POST">
            <div class="form-group">
                <label>USERNAME</label>
                <input type="text" name="username" required placeholder="Enter username" autocomplete="username">
            </div>
            <div class="form-group">
                <label>PASSWORD</label>
                <input type="password" name="password" required placeholder="Enter password" autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary">LOGIN</button>
        </form>
        
        <div class="footer">
            <p>Default: <span>admin</span> / <span>admin</span></p>
        </div>
    </div>
</body>
</html>
