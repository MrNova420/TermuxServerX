# Valheim Server Configuration
# Optimized for Android/Termux environments

[server]
server_name=TermuxServer
world=terrastation
password=CHANGE_ME
confirm_password=CHANGE_ME
port=2456
gameport=2456
query_port=2457
auto_backup=true
backup_interval_seconds=300
backup_location=~/TermuxServerX/data/valheim/backups

[game]
difficulty=2
max_players=10
PvP=true
password_strength=1

[performance]
# Reduce tick rate for mobile/limited devices
tick_rate=20
max_connections=20
