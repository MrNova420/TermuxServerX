# PocketMine-MP Server - Optimized Configuration
# Place in ~/TermuxServerX/data/pocketmine/

# server.properties
# Main Configuration
port=19135
white-list=on
max-players=20
gamemode=0
world-name=world
server-name=TermuxServerX PocketMine
server-port=19135
level-name=world
level-seed=
view-distance=10

# Network
auto-updater.enabled=on
auto-updater.on-update.warn-ops=on
auto-updater.preferred-channel=stable
auto-updater.preferred-channel.periodic-check=3600

# Performance
async-workers=auto
max-chunks-per-subchunk=1024
cache-chunks=true
cache-chunks.age=300

# Economy
preload-chunks=true

# Start Script
#!/bin/bash
while true; do
    echo "[$(date)] Starting PocketMine-MP..."
    ./PocketMine-MP.phar
    echo "[$(date)] Restarting in 5 seconds..."
    sleep 5
done
```

# plugins.yml - Essential Plugins
---
name: EssentialUI
version: 1.0.0
author: TermuxServerX
main: EssentialUI\Main
api: 4.0.0
---
# Add PocketMine-specific configs

# permissions.yml
---
default:
  - pocketmine.command.help
  - pocketmine.command.list
  - pocketmine.command.timings
ops:
  - console
  - your-playername
members: []
superadmin: []
admin: []
```

# Backup Script
#!/bin/bash
BACKUP_DIR="$HOME/TermuxServerX/backups/pocketmine"
mkdir -p "$BACKUP_DIR"
tar -czf "$BACKUP_DIR/world_$(date +%Y%m%d_%H%M%S).tar.gz" worlds/ plugins/ pocketmine.yml server.properties 2>/dev/null
find "$BACKUP_DIR" -name "*.tar.gz" -mtime +7 -delete
```
