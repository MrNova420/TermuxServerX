# Rust Server Configuration
# Optimized for Android/Termux

# Server Identity
hostname "TermuxServerX Rust Server"
server.description "Rust server powered by TermuxServerX"
server.url "https://termuxserverx.local"
server.headerimage ""
server.identity "rust_server"
server.saveinterval 300

# Network
server.ip 0.0.0.0
server.port 28015
rcon.ip 0.0.0.0
rcon.port 28016
rcon.password "CHANGE_ME"
rcon.web true

# Game Settings
maxplayers 50
spawn.min_distance 50
spawn.max_distance 1000
decay.scale 1
day.length 60
night.length 15
radar.enabled true

# Performance (Android-optimized)
performance.memory 2048
performance.maxthreads 4
performance.graphical.quality low
performance.lights.enabled false
performance.vegetation.enabled true
performance.vegetation.distance low

# Wipe Settings
wipe.min_players_to_start_wipe 0
wipe.on_new_save false
