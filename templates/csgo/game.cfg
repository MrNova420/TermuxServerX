# CS:GO Game Server Config
# Place in: csgo/cfg/

// RCON Configuration
rcon_password "YOUR_RCON_PASSWORD"
rcon_port 27015

// Server Logging
log on
sv_logbans 1
sv_logecho 1
sv_logfile 1
sv_log_onefile 0

// LAN Settings
sv_lan 0
sv_allow_lobby_connect_only 0

// VAC Settings
sv_vac 1
sv_spec_noclip 1

// Voice Communication
sv_voiceenable 1
sv_voicecodec voice_speex
sv_voicequality 5

// Download Settings
sv_allowdownload 1
sv_allowupload 1
net_maxfilesize 15

// Performance
fps_max 128
fps_max_menu 60
