# spigot.yml - Performance
config-version: 21
settings:
  save-only-player-tickets: true
  user-cache-size: 500
  sample-count: 12
  player-shuffle: 0
  timeout-time: 60
  restart-on-crash: true
  restart-script: ./start.sh
  netty-threads: 4
  bungeecord: false
  stats: enabled
  disabled-advancements:
  - story/disabled
messages:
  whitelist: Server is whitelisted.
  unknown-command: Unknown command
  server-full: Server is full!
timings:
  enabled: true
  verbose: true
  server-name-normalized: TermuxServerX
world-settings:
  default:
    view-distance: 10
    simulation-distance: 6
    mob-spawn-range: 4
    entity-tracking-range: 48
    hopper-amount: 1
    growth: 12,8,12
    entity-activation-range:
      animals: 16
      monsters: 24
      raiders: 48
      misc: 8
      other: 16
    ticks-per:
      hopper-transfer: 8
      hopper-check: 8
    hunger:
      walk-speed: 0.2
      sprint-speed: 0.28
